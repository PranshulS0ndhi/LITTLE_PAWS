
services:
  redis:
    image: redis:alpine
    container_name: lilpaws-redis
    ports:
      - "6379:6379"

  backend:
    build: ./server
    container_name: lilpaws-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - REDIS_URL=${REDIS_URL}
      - PORT=${PORT}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLIENT_SECRET_KEY=${CLIENT_SECRET_KEY}
    depends_on:
      - redis

  ai-api:
    build: ./ai-review-service
    container_name: lilpaws-ai-api
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - DATABASE_NAME=${DATABASE_NAME}
      - REDIS_URL=${REDIS_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: python main.py
    depends_on:
      - redis

  ai-worker:
    build: ./ai-review-service
    container_name: lilpaws-ai-worker
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - DATABASE_NAME=${DATABASE_NAME}
      - REDIS_URL=${REDIS_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: python worker.py
    depends_on:
      - redis

  frontend:
    build: ./client
    container_name: lilpaws-frontend
    ports:
      - "5100:80"
    depends_on:
      - backend

# volumes section removed as mongo-data is no longer needed localy
